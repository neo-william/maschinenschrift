# Siegel-Seite
[atlasIntro]
other = "Das Siegel kodiert drei Achsen der Entstehung eines Textes: Diktion (D, sprachliche Oberfläche, 0–5), Geist (G, Inhalt, 0–5) und Korrespondenz (K, bibliographische Bestätigung, binär). Diagnose-Formel: *Geist aus der Maschine*. Bedeutung und Vokabular: <a href=\"/de/foundation/\">Foundation</a>. Geometrie: <a href=\"/de/spec/siegel-v6/\">Siegel-Spec v6</a>."

[siegelUseIntro]
other = "Autorinnen und Autoren bilden das Siegel im eigenen Werk ab — auf der Impressumsseite, auf dem Cover, oder an einer anderen Stelle des Werks. Die D/G/K-Werte mit dem Generator unten setzen und das Siegel als SVG (Vektor, für den Satz) oder PNG (1024 px) herunterladen."

[siegelNoscript]
other = "Der Generator benötigt JavaScript. Ohne JavaScript liegen die 72 vor-generierten Siegel-Assets direkt unter <code>/siegel/assets/d{D}-g{G}-{belegt|ausstehend}.svg</code>, jeweils auch als PNG in 512, 1024 und 2048 px."

[atlasLicenseHeading]
other = "Lizenz"

[atlasLicenseBody]
other = "Die Siegel-Assets stehen unter CC BY 4.0. Freie Verwendung mit Attribution durch Verweis auf maschinenschrift.com. Verwendung als Herkunftszeichen setzt voraus, dass das Werk im Maschinenschrift-Standard öffentlich deklariert ist (siehe Foundation)."

