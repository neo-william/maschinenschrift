# Siegel-Seite
[atlasLead]
other = "Das Siegel ist eine Selbst-Auskunft. Die Autorin sagt, in eigener Hand, wie viel die Maschine geholfen hat."

[atlasAxesHeading]
other = "Die drei Achsen"

[atlasAxes]
other = """- **Diktion** — wie viel der Oberfläche, also Sätze, Wortwahl, Rhythmus, von der Maschine kam.
- ***Geist*** — wie viel der Substanz, also Ideen, Argument, Struktur, von der Maschine kam.
- **Korrespondenz** — ob die sachlichen Aussagen gegen Quellen geprüft wurden.

Zwei Reihen Punkte, null bis fünf pro Achse, zählen den Anteil der Maschine. Ein Halbstrich darunter heißt: die Korrespondenz steht noch aus.

*Geist* bleibt deutsch. Das Wort trägt Hegel und die Geisteswissenschaften mit. Die Diagnose-Formel lautet *Geist aus der Maschine*. Vokabular: [Idee](/de/idee/)."""

[atlasUseHeading]
other = "Wie das Siegel gesetzt wird"

[siegelUseIntro]
other = "Die Autorin setzt die D/G/K-Werte am Generator. Sie lädt das Siegel als SVG oder als PNG mit 1024 Pixeln. Sie platziert es bei der Verfasserzeile — Cover, Titelseite, Impressum. Kolophon-Zeile und HTML-Embed tragen dieselbe Deklaration in Impressen und auf Webseiten."

[siegelNoscript]
other = "Der Generator benötigt JavaScript. Ohne JavaScript liegen die 72 vor-generierten Siegel-Assets direkt unter <code>/siegel/assets/d{D}-g{G}-{belegt|ausstehend}.svg</code>, jeweils auch als PNG in 512, 1024 und 2048 px."

[atlasLicenseHeading]
other = "Lizenz"

[atlasLicenseBody]
other = "Die Siegel-Assets stehen unter CC BY 4.0. Frei verwendbar mit Verweis auf maschinenschrift.com. Als Herkunftszeichen gilt das Siegel nur, wo das Werk im Standard deklariert ist (siehe [Idee](/de/idee/))."

