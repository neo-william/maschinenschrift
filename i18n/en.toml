# Seal page
[atlasLead]
other = "A small mark, set by the author. It says where the machine helped, and how much."

[atlasAxesHeading]
other = "The three axes"

[atlasAxes]
other = """- **Diction** (D, 0–5) — how much of the surface (sentences, word choice, rhythm) came from the machine.
- ***Geist*** (G, 0–5) — how much of the substance (ideas, argument, structure) came from the machine.
- **Correspondence** (K, binary) — whether the factual claims have been checked against sources.

*Geist* stays in German. Hegel and *Geisteswissenschaften* stand behind the word. The gloss in English is *Ghost from the Machine*. The diagnostic formula is *Geist aus der Maschine*. Meaning and vocabulary belong to the [Idea](/idea/)."""

[atlasUseHeading]
other = "How the seal is set"

[siegelUseIntro]
other = "The author sets D, G, and K with the generator. The seal downloads as SVG for typesetting, or as PNG at 1024 px. It then goes into the book near the byline — cover, title page, about page. The colophon line and the HTML embed carry the same declaration into imprints and websites."

[siegelNoscript]
other = "The generator requires JavaScript. Without it, the 72 pre-rendered seal assets are available directly at <code>/siegel/assets/d{D}-g{G}-{belegt|ausstehend}.svg</code>, each also as PNG in 512, 1024, and 2048 px."

[atlasLicenseHeading]
other = "License"

[atlasLicenseBody]
other = "The seal assets are released under CC BY 4.0. Attribute by linking to maschinenschrift.com. Use it as an origin mark only if the work declares itself in the Maschinenschrift standard — see the [Idea](/idea/)."

