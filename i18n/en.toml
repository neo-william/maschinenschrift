# Seal page
[atlasIntro]
other = "The seal encodes three axes of the genesis of a text: Diction (D, linguistic surface, 0–5), Geist (G, content, 0–5; German, untranslated — *Geist* in the sense of Hegel and Geisteswissenschaften, an occasional gloss being *Ghost from the Machine*), and Correspondence (K, bibliographic confirmation, binary). Diagnostic formula: *Geist aus der Maschine*. Meaning and vocabulary: <a href=\"/foundation/\">Foundation</a>. Geometry: <a href=\"/spec/siegel-v6/\">Siegel-Spec v6</a>."

[siegelUseIntro]
other = "Authors reproduce the seal in their own book — on the copyright page, on the cover, or elsewhere in the work. Set the D/G/K values with the generator below and download the seal as SVG (vector, for typesetting) or PNG (1024 px)."

[siegelNoscript]
other = "The generator requires JavaScript. Without it, the 72 pre-rendered seal assets are available directly at <code>/siegel/assets/d{D}-g{G}-{belegt|ausstehend}.svg</code>, each also as PNG in 512, 1024, and 2048 px."

[atlasLicenseHeading]
other = "License"

[atlasLicenseBody]
other = "The seal assets are licensed under CC BY 4.0. Free use with attribution by a reference to maschinenschrift.com. Use as origin mark requires that the work is publicly declared in the Maschinenschrift standard (see Foundation)."

