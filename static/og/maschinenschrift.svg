<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Maschinenschrift OG-Card: 1200x630 (Twitter/Facebook empfohlen).
       Statisches Bild fuer alle Seiten (Spec-Entscheidung D-5).
       Rasterung zu PNG via rsvg-convert im CI:
         rsvg-convert -w 1200 maschinenschrift.svg -o maschinenschrift.png -->

  <!-- Hintergrund -->
  <rect width="1200" height="630" fill="#fdfdfb"/>

  <!-- Siegel-Glyph (zentriert oben).
       Spec-konform v5: das mittlere Zeichen F=2/S=3/verified als Beispiel,
       skaliert in den OG-Mittelpunkt.
       ViewBox des Siegels ist 130x100 — skaliert hier auf 390x300 (3x). -->
  <g transform="translate(405, 130)" fill="#1a1a1a">
    <!-- Klammern: linker Schaft -->
    <rect x="45.3" y="75.3" width="5.4" height="149.4"/>
    <rect x="45.3" y="75.3" width="26.7" height="5.4"/>
    <rect x="45.3" y="219.3" width="26.7" height="5.4"/>
    <!-- Klammern: rechter Schaft -->
    <rect x="339.3" y="75.3" width="5.4" height="149.4"/>
    <rect x="315.3" y="75.3" width="29.4" height="5.4"/>
    <rect x="315.3" y="219.3" width="29.4" height="5.4"/>
    <!-- Form-Punkte: F=2, obere Zeile y=108 (=36*3), x=120,156 (=40*3,52*3) -->
    <circle cx="120" cy="108" r="6.6"/>
    <circle cx="156" cy="108" r="6.6"/>
    <!-- Substanz-Punkte: S=3, mittlere Zeile y=150 (=50*3), x=120,156,192 -->
    <circle cx="120" cy="150" r="6.6"/>
    <circle cx="156" cy="150" r="6.6"/>
    <circle cx="192" cy="150" r="6.6"/>
    <!-- Verifikation: verified -> keine Darstellung -->
  </g>

  <!-- Wortmarke -->
  <text x="600" y="500"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="62"
        font-weight="400"
        letter-spacing="2"
        fill="#1a1a1a">Maschinenschrift</text>

  <!-- Tagline -->
  <text x="600" y="555"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="22"
        fill="#666">Offener Standard zur Selbstdeklaration sprachsubstrat-vermittelter Literatur</text>

  <!-- Hairline am unteren Rand als typografische Anker -->
  <rect x="500" y="600" width="200" height="1" fill="#aaa"/>
</svg>
