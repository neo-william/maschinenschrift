{{ define "main" }}
<article class="siegel-page">
  <header>
    <h1>{{ .Title }}</h1>
    <p>{{ i18n "atlasLead" }}</p>
  </header>

  <!-- Das Werkzeug zuerst; die Erklaerung folgt. -->
  <section id="siegel-preview" class="siegel-preview" aria-live="polite">
    <noscript>
      <p>{{ i18n "siegelNoscript" | safeHTML }}</p>
    </noscript>
  </section>

  <section class="siegel-use">
    <h2>{{ i18n "atlasUseHeading" }}</h2>
    <p>{{ i18n "siegelUseIntro" }}</p>
  </section>

  <section class="siegel-axes">
    <h2>{{ i18n "atlasAxesHeading" }}</h2>
    {{ i18n "atlasAxes" | markdownify }}
  </section>

  <aside class="siegel-license">
    <h2>{{ i18n "atlasLicenseHeading" }}</h2>
    {{ i18n "atlasLicenseBody" | markdownify }}
  </aside>

  <script src="/js/live-preview.js?v={{ substr (md5 (readFile "static/js/live-preview.js")) 0 8 }}" defer></script>
</article>
{{ end }}
